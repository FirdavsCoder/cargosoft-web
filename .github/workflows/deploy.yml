name: Cargosoft Web PROD CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  deploy:
    name: Deploy
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        id: deploy
        run: |
          set -o pipefail
          {
            ssh -o StrictHostKeyChecking=accept-new ${{ secrets.USERNAME }}@${{ secrets.HOST }} "
              set -e
              cd /var/www/cargosoft-web/prod &&
              git fetch --prune origin main &&
              git reset --hard ${{ github.sha }} &&
              pnpm install --frozen-lockfile &&
              pnpm run build
            "
          } 2>&1 | tee deploy.log

      - name: Send success message to Telegram topic
        if: success()
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 200 | sed 's/[*_`\[]/\\&/g')
          AUTHOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          TIME=$(date '+%Y-%m-%d %H:%M:%S')
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="-1002678453781" \
            -d message_thread_id=881 \
            -d parse_mode=Markdown \
            -d text="✅ *CARGOSOFT WEB (MARKETING SITE)* muvaffaqiyatli deploy bo'ldi! 🚀%0A%0A🌐 https://cargosoft.uz%0A🕓 *${TIME}*%0A👤 *${AUTHOR}*%0A🌿 Branch: *${BRANCH}*%0A📝 Commit: _${COMMIT_MSG}_%0A🔗 [Commit log](${COMMIT_URL})"

      - name: Send failure message to Telegram topic
        if: failure()
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 200 | sed 's/[*_`\[]/\\&/g')
          AUTHOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          TIME=$(date '+%Y-%m-%d %H:%M:%S')
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          ERROR_LOG=""
          if [ -f deploy.log ]; then
            ERROR_LOG=$(tail -n 15 deploy.log | sed 's/[`*_]/\\&/g' | sed 's/$/%0A/' | tr -d '\n')
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="-1002678453781" \
            -d message_thread_id=881 \
            -d parse_mode=Markdown \
            -d text="❌ *CARGOSOFT WEB (MARKETING SITE)* deploy bo'lmadi!%0A%0A🕓 *${TIME}*%0A👤 *${AUTHOR}*%0A🌿 Branch: *${BRANCH}*%0A📝 Commit: _${COMMIT_MSG}_%0A🔗 [Commit log](${COMMIT_URL})%0A%0A⚠️ *Xato log (oxirgi 15 qator):*%0A\`\`\`${ERROR_LOG}\`\`\`"
